# radiomicviz preset: mri-texture
# Texture features only (GLCM, GLRLM, GLSZM, GLDM, NGTDM). No shape or first-order.
# Use when you specifically need texture characterization (e.g., lesion heterogeneity).

setting:
  binCount: 32
  geometryTolerance: 1e-4
  label: 1
  interpolator: 'sitkBSpline'
  resampledPixelSpacing: null
  normalize: true
  normalizeScale: 100
  voxelArrayShift: 300
  preCrop: true
  correctMask: true
  additionalInfo: true

imageType:
  Original: {}

featureClass:
  glcm:
    - 'Autocorrelation'
    - 'JointAverage'
    - 'ClusterProminence'
    - 'ClusterShade'
    - 'ClusterTendency'
    - 'Contrast'
    - 'Correlation'
    - 'DifferenceAverage'
    - 'DifferenceEntropy'
    - 'DifferenceVariance'
    - 'JointEnergy'
    - 'JointEntropy'
    - 'Imc1'
    - 'Imc2'
    - 'Idm'
    - 'Idmn'
    - 'Id'
    - 'Idn'
    - 'InverseVariance'
    - 'MaximumProbability'
    - 'SumEntropy'
    - 'SumSquares'
  glrlm:
  glszm:
  gldm:
  ngtdm:
