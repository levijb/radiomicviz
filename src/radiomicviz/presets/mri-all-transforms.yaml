# radiomicviz preset: mri-all-transforms
# Full extraction with all image transforms: LoG, Wavelet, Square, SquareRoot,
# Logarithm, Exponential, Gradient, LBP2D, LBP3D. Generates thousands of features.
# Use when you want exhaustive feature sets for feature selection / ML pipelines.
#
# WARNING: This is slow. Expect 5-30 min per subject depending on ROI size.
# Consider using the 'chunked' or 'array' SLURM strategy for large cohorts.

setting:
  binWidth: 25
  geometryTolerance: 1e-4
  label: 1
  interpolator: 'sitkBSpline'
  resampledPixelSpacing: [1, 1, 1]
  weightingNorm: null
  normalize: false
  normalizeScale: 100
  voxelArrayShift: 300
  preCrop: true
  correctMask: true
  additionalInfo: true

imageType:
  Original: {}
  LoG:
    sigma: [1.0, 3.0, 5.0]
  Wavelet: {}
  Square: {}
  SquareRoot: {}
  Logarithm: {}
  Exponential: {}
  Gradient: {}
  LBP2D: {}
  LBP3D: {}

featureClass:
  shape:
  firstorder:
  glcm:
    - 'Autocorrelation'
    - 'JointAverage'
    - 'ClusterProminence'
    - 'ClusterShade'
    - 'ClusterTendency'
    - 'Contrast'
    - 'Correlation'
    - 'DifferenceAverage'
    - 'DifferenceEntropy'
    - 'DifferenceVariance'
    - 'JointEnergy'
    - 'JointEntropy'
    - 'Imc1'
    - 'Imc2'
    - 'Idm'
    - 'Idmn'
    - 'Id'
    - 'Idn'
    - 'InverseVariance'
    - 'MaximumProbability'
    - 'SumEntropy'
    - 'SumSquares'
  glrlm:
  glszm:
  gldm:
