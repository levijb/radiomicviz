# radiomicviz preset: mri-habitat
# Curated first-order + texture subset for habitat clustering workflows.
# Designed for intra-tumor heterogeneity analysis. No shape features (not
# meaningful in voxelwise / sliding-window mode). Uses binCount=64 for finer
# intensity discretization typical in habitat analysis.

setting:
  binCount: 64
  label: 1
  correctMask: true
  interpolator: 'sitkBSpline'
  resampledPixelSpacing: null

imageType:
  Original: {}

featureClass:
  firstorder:
  glcm:
    - 'Autocorrelation'
    - 'Contrast'
    - 'Correlation'
    - 'DifferenceEntropy'
    - 'JointEnergy'
    - 'JointEntropy'
    - 'SumEntropy'
    - 'SumSquares'
  glrlm:

voxelSetting:
  kernelRadius: 1
  maskedKernel: true
  initValue: nan
  voxelBatch: 2500
